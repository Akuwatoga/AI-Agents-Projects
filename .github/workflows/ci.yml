name: Validate web application

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: web
      - name: Validate localization structure
        run: npm run i18n:ci
        working-directory: web
      - name: Build production site
        run: npm run build
        working-directory: web
      - name: Build deployment image
        run: docker build -t ai-agents-atlas:ci .
